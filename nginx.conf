# Nginx configuration for Prof. Milena Prado
# Place this file in /etc/nginx/sites-available/prof_milena
# Then create symlink: ln -s /etc/nginx/sites-available/prof_milena /etc/nginx/sites-enabled/prof_milena

upstream prof_milena_app {
    server 127.0.0.1:8000;
}

# HTTP redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name profmilenaprado.com.br www.profmilenaprado.com.br;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name profmilenaprado.com.br www.profmilenaprado.com.br;
    
    # SSL Certificate (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/profmilenaprado.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/profmilenaprado.com.br/privkey.pem;
    
    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Logging
    access_log /var/log/nginx/prof_milena_access.log;
    error_log /var/log/nginx/prof_milena_error.log;
    
    # Client upload size
    client_max_body_size 100M;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/atom+xml image/svg+xml;
    
    # Static files
    location /static/ {
        alias /root/software_projects/prof_milena_prado/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Media files
    location /media/ {
        alias /root/software_projects/prof_milena_prado/media/;
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # Favicon
    location /favicon.ico {
        alias /root/software_projects/prof_milena_prado/static/favicon.ico;
        expires 30d;
    }
    
    # Proxy to Gunicorn
    location / {
        proxy_pass http://prof_milena_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
